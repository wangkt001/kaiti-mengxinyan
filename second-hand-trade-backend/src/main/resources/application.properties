spring.application.name=campus-second-hand-trade

# 数据库连接配置
spring.datasource.url=jdbc:mysql://localhost:3306/employment_mengxinyan?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 数据库初始化配置
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.continue-on-error=true

# MyBatis配置
mybatis.mapper-locations=classpath:mapper/**/*.xml
mybatis.type-aliases-package=com.campus.secondhand.model
mybatis.configuration.map-underscore-to-camel-case=true

# 服务器配置
server.port=8080
server.servlet.context-path=/api

# 文件上传配置
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# 日志配置
logging.level.com.campus.secondhand=debug
