spring.application.name=campus-second-hand-trade

# 数据库连接配置
spring.datasource.url=jdbc:mysql://localhost:3306/campus_second_hand?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MyBatis-Plus配置
mybatis-plus.mapper-locations=classpath:mapper/**/*.xml
mybatis-plus.type-aliases-package=com.campus.secondhand.model

# 服务器配置
server.port=8080
server.servlet.context-path=/api

# 日志配置
logging.level.com.campus.secondhand=debug
